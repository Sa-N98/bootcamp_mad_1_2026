<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
        }
        nav {
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.25rem;
            line-height: 1.75rem;
            font-weight: 600;
            text-align: center;
            color: #000;
            margin-bottom: 0.5rem;
        }
        p {
            text-align: center;
            color: #6B7280;
            margin-bottom: 1rem;
        }
        form {
            background-color: #fff;
            display: block;
            padding: 1rem;
            max-width: 350px;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        form input[type="email"],
        form input[type="password"] {
            outline: none;
            border: 1px solid #e5e7eb;
            margin: 8px 0;
            background-color: #fff;
            padding: 1rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            width: calc(100% - 2rem);
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        form input[type="submit"] {
            outline: none;
            border: 1px solid #e5e7eb;
            display: block;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
            background-color: #4F46E5;
            color: #ffffff;
            font-size: 0.875rem;
            line-height: 1.25rem;
            font-weight: 500;
            width: 100%;
            border-radius: 0.5rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>

</head>
<body>
    <nav>
    <a href="/">Home</a>
    <a href="/signup">SignUp</a>
   </nav>
    {{signup_message}}
    <h1>Welcome to the Login Page</h1>
    <p>Enter your credentials to login</p>

     <form action="/login" method="post">
        Email: <input type="email" name="e_mail" placeholder="Enter Email"></type> <br>
        password: <input type="password" name="p_word" placeholder="Enter Email"></type>
        <input type="submit" value="Login">
    </form>

</body>
</html>
