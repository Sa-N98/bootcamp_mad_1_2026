<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <input type="text" placeholder="Search songs" required>
        <input type="submit" value="Search"> 
    </form>
    <hr>
    {% for song in songs %}
    <audio id="player-{{ song.title }}" src="/static/{{song.file_path}}"></audio>
    <div>
    <button onclick="document.getElementById('player-{{ song.title }}').play()">Play</button>
    <button onclick="document.getElementById('player-{{ song.title }}').pause()">Pause</button>
    </div>

    <p>Title: {{song.title}}</p>
    <p>Artist: {{song.artist}}</p>
    <p>Likes: {{song.total_favourits}}</p>
    
    <form action="/add_favourits" method="post">
        <input type="text" name='song_id' value="{{song.id}}" hidden>
        <input type="text" name='user_id' value="{{session_user_id}}" hidden>
        <input type="submit" value="favourit">
    </form>

    <br>
    {%endfor%}
</body>
</html>
